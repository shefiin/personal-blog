services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - code-context-network

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - code-context-network

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ../services/auth-service/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - code-context-network

  blog-service:
    build:
      context: ../services/blog-service
      dockerfile: Dockerfile
    container_name: blog-service
    restart: always
    ports:
      - "3004:3004"
    env_file:
      - ../services/blog-service/.env
    depends_on:
      - mongodb
    networks:
      - code-context-network

  api-gateway:
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ../services/api-gateway/.env
    depends_on:
      - auth-service
      - blog-service
    networks:
      - code-context-network

networks:
  code-context-network:
    driver: bridge

volumes:
  mongodb-data:





















































    

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    restart: always
    volumes:
      - mongodb-data:/data/db
    networks:
      - code-context-network

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: always  
    networks:
      - code-context-network
    

  auth-service:
    build: 
      context: ../services/auth-service
      dockerfile: Dockerfile.dev
    container_name: auth-service
    restart: always
    ports:
      - "3001:3001" 
    volumes:
      - ../services/auth-service:/app
      - /app/node_modules
    env_file: 
      - ../services/auth-service/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - code-context-network

  blog-service:
    build:
      context: ../services/blog-service
      dockerfile: Dockerfile.dev
    container_name: blog-service
    restart: always
    ports:
      - "3004:3004"
    volumes:
      - ../services/blog-service:/app
      - /app/node_modules
    env_file:
      - ../services/blog-service/.env
    networks:
      - code-context-network


  api-gateway:
    build: 
      context: ../services/api-gateway
      dockerfile: Dockerfile.dev
    container_name: api-gateway
    restart: always
    env_file: 
      - ../services/api-gateway/.env
    ports: 
      - "8000:8000"
    volumes:
      - ../services/api-gateway:/app
      - /app/node_modules  
    depends_on: 
      - auth-service
      - blog-service
    networks:
      - code-context-network     

networks:
  code-context-network:
    driver: bridge

volumes:
  mongodb-data:
    



























































    
